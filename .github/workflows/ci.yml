name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Create venv and install
        run: |
          uv venv .venv
          uv pip install -e ".[dev]"
        shell: bash

      - name: Run tests
        run: |
          source .venv/bin/activate || source .venv/Scripts/activate
          python -m pytest tests/ -v --tb=short
        shell: bash

      - name: Check formatting
        run: |
          source .venv/bin/activate || source .venv/Scripts/activate
          black --check python/ tests/
        shell: bash

      - name: Lint
        run: |
          source .venv/bin/activate || source .venv/Scripts/activate
          flake8 python/ tests/
        shell: bash

  cran-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build CRAN-check image
        run: docker build -f Dockerfile.cran -t gbrs-cran-check .

      - name: R CMD check --as-cran
        run: |
          mkdir -p $GITHUB_WORKSPACE/check-output
          docker run --rm -v $GITHUB_WORKSPACE/check-output:/work/check-output gbrs-cran-check

      - name: Surface check log on failure
        if: failure()
        run: |
          echo "=== 00check.log ==="
          cat $GITHUB_WORKSPACE/check-output/gbrs.Rcheck/00check.log 2>/dev/null || echo "(no check.log)"
          echo "=== 00install.out ==="
          cat $GITHUB_WORKSPACE/check-output/gbrs.Rcheck/00install.out 2>/dev/null || echo "(no install.out)"

      - name: Upload check artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cran-check-output
          path: check-output/
          if-no-files-found: ignore
